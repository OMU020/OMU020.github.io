<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Wiki Studio - Global Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght=300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    
    <style>
        :root {
            --accent: #6366f1;
            --accent-hover: #4f46e5;
            --transition: all 0.2s ease;
        }

        [data-theme="dark"] {
            --bg-main: #121214;
            --bg-sidebar: #1a1a1e;
            --bg-card: #26262b;
            --text-main: #e3e3e6;
            --text-muted: #9ca3af;
            --border: #323238;
            --input-bg: #121214;
            --diff-del: #442326;
            --diff-del-text: #ff9494;
            --diff-add: #1b3c2a;
            --diff-add-text: #99ff99;
            --ac-bg: #222227;
            --ac-hover: #31313a;
            --ac-desc: #74747c;
        }

        [data-theme="light"] {
            --bg-main: #f9fafb;
            --bg-sidebar: #f3f4f6;
            --bg-card: #ffffff;
            --text-main: #111827;
            --text-muted: #6b7280;
            --border: #e5e7eb;
            --input-bg: #ffffff;
            --diff-del: #fee2e2;
            --diff-del-text: #991b1b;
            --diff-add: #dcfce7;
            --diff-add-text: #166534;
            --ac-bg: #ffffff;
            --ac-hover: #f3f4f6;
            --ac-desc: #9ca3af;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
            transition: var(--transition);
        }

        /* 사이드바 */
        aside { width: 280px; background-color: var(--bg-sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 24px; }
        .sidebar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .wiki-logo { font-size: 1.3rem; font-weight: 700; color: var(--accent); display: flex; align-items: center; gap: 8px; cursor: pointer; }
        
        .header-actions { display: flex; gap: 4px; align-items: center; }
        .theme-toggle, .lang-toggle, .btn-icon {
            background: none; border: none; color: var(--text-muted); cursor: pointer;
            display: flex; align-items: center; justify-content: center; padding: 6px; border-radius: 50%;
        }
        .theme-toggle:hover, .lang-toggle:hover, .btn-icon:hover { background-color: var(--bg-card); color: var(--text-main); }
        .lang-toggle { font-size: 0.8rem; font-weight: 700; border-radius: 6px; padding: 4px 6px; border: 1px solid var(--border); }
        
        .search-box { position: relative; margin-bottom: 16px; }
        .search-box input {
            width: 100%; padding: 10px 12px 10px 36px; background-color: var(--input-bg);
            border: 1px solid var(--border); border-radius: 8px; color: var(--text-main); font-size: 0.9rem; outline: none;
        }
        .search-box .material-icons { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 1.2rem; }
        .btn-add-wiki {
            width: 100%; padding: 10px; margin-bottom: 16px; background-color: var(--accent); color: white;
            border: none; border-radius: 8px; font-weight: 500; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px;
        }
        .btn-add-wiki:hover { background-color: var(--accent-hover); }
        .menu-list { list-style: none; overflow-y: auto; flex-grow: 1; }
        .menu-item { padding: 10px 12px; margin-bottom: 4px; border-radius: 6px; cursor: pointer; color: var(--text-muted); display: flex; align-items: center; gap: 8px; }
        .menu-item:hover, .menu-item.active { background-color: var(--bg-card); color: var(--text-main); }
        .menu-item.active { border-left: 4px solid var(--accent); padding-left: 8px; font-weight: 500; }

        /* 메인 영역 */
        main { flex-grow: 1; padding: 40px 60px; overflow-y: auto; display: flex; justify-content: center; }
        .content-container { width: 100%; max-width: 800px; position: relative; }
        
        /* 툴바 */
        .wiki-actions { position: absolute; top: 0; right: 0; display: flex; gap: 8px; }
        .wiki-header { border-bottom: 1px solid var(--border); padding-bottom: 16px; margin-bottom: 24px; padding-right: 160px;}
        .wiki-title { font-size: 2.3rem; font-weight: 700; margin-bottom: 8px; word-break: break-all; }
        .wiki-meta { font-size: 0.85rem; color: var(--text-muted); display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
        .tag { background-color: var(--bg-sidebar); color: var(--accent); padding: 2px 8px; border-radius: 4px; font-size: 0.8rem; }
        
        /* 본문 스타일 */
        .wiki-body { font-size: 1.05rem; line-height: 1.8; color: var(--text-main); }
        .wiki-body h2 { margin: 32px 0 12px 0; border-bottom: 1px solid var(--border); padding-bottom: 6px; font-size: 1.6rem; }
        .wiki-body h3 { margin: 24px 0 10px 0; border-left: 4px solid var(--accent); padding-left: 10px; font-size: 1.25rem; }
        .wiki-body p { margin-bottom: 14px; }
        .wiki-body ul, .wiki-body ol { margin-left: 24px; margin-bottom: 14px; }
        .wiki-body img { max-width: 100%; height: auto; border-radius: 8px; margin: 16px 0; display: block; border: 1px solid var(--border); }
        
        .wiki-body table { width: 100%; border-collapse: collapse; margin: 20px 0; }
        .wiki-body th, .wiki-body td { border: 1px solid var(--border); padding: 10px 12px; text-align: left; }
        .wiki-body th { background-color: var(--bg-sidebar); }

        /* 공통 폼 레이아웃 */
        .wiki-pane { display: none; }
        .active-pane { display: block; }
        
        .form-group { margin-bottom: 16px; position: relative; }
        .form-group label { display: block; margin-bottom: 6px; font-size: 0.9rem; color: var(--text-muted); font-weight: 500; }
        .form-control {
            width: 100%; padding: 12px; background-color: var(--input-bg); border: 1px solid var(--border);
            border-radius: 8px; color: var(--text-main); font-size: 1rem; outline: none;
        }
        textarea.form-control { min-height: 380px; resize: vertical; font-family: monospace; font-size: 0.95rem; line-height: 1.5; }
        
        /* 자동완성 팝업 스타일 */
        .autocomplete-popup {
            position: absolute; display: none; z-index: 1000; width: 340px;
            background-color: var(--ac-bg); border: 1px solid var(--border);
            border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.25);
            max-height: 260px; overflow-y: auto; list-style: none;
        }
        .autocomplete-popup::-webkit-scrollbar { width: 6px; }
        .autocomplete-popup::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
        .autocomplete-popup::-webkit-scrollbar-track { background: transparent; }

        .ac-item {
            height: 37px; padding: 0 12px; cursor: pointer; display: flex; justify-content: space-between;
            align-items: center; font-family: monospace; font-size: 0.85rem; border-bottom: 1px solid rgba(0,0,0,0.02);
        }
        .ac-item:hover, .ac-item.selected { background-color: var(--ac-hover); }
        .ac-item.selected .ac-tag { text-decoration: underline; }
        .ac-tag { color: var(--accent); font-weight: bold; }
        .ac-desc { color: var(--ac-desc); font-size: 0.78rem; text-align: right; margin-left: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 190px; }

        /* 이미지 업로드 */
        .image-upload-zone { border: 2px dashed var(--border); padding: 20px; border-radius: 8px; text-align: center; cursor: pointer; color: var(--text-muted); }
        .image-upload-zone:hover { border-color: var(--accent); color: var(--text-main); }
        .image-preview-container { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 10px; }
        .preview-img-wrap { position: relative; width: 80px; height: 80px; }
        .preview-img-wrap img { width: 100%; height: 100%; object-fit: cover; border-radius: 6px; }
        .preview-img-wrap .del-btn { position: absolute; top: -4px; right: -4px; background: red; color: white; border: none; border-radius: 50%; width: 18px; height: 18px; font-size: 10px; cursor: pointer; }

        .form-actions { display: flex; justify-content: space-between; gap: 12px; margin-top: 24px; }
        .btn { padding: 10px 20px; border-radius: 8px; font-weight: 500; cursor: pointer; border: none; font-size: 0.95rem; }
        .btn-primary { background-color: var(--accent); color: white; }
        .btn-primary:hover { background-color: var(--accent-hover); }
        .btn-secondary { background-color: var(--bg-sidebar); color: var(--text-main); border: 1px solid var(--border); }

        /* 역사 내역 스타일 */
        .history-list { list-style: none; margin-top: 20px; }
        .history-item {
            padding: 16px; background-color: var(--bg-sidebar); border: 1px solid var(--border);
            border-radius: 8px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center;
        }
        .history-info h4 { font-size: 1.05rem; margin-bottom: 4px; color: var(--text-main); }
        .history-info p { font-size: 0.85rem; color: var(--text-muted); }

        /* Diff 스타일 */
        .diff-container {
            margin-top: 20px; background-color: var(--input-bg); border: 1px solid var(--border);
            border-radius: 8px; font-family: monospace; font-size: 0.95rem; overflow: hidden; line-height: 1.6;
        }
        .diff-line { display: flex; padding: 4px 12px; border-bottom: 1px solid rgba(0,0,0,0.05); white-space: pre-wrap; word-break: break-all; }
        .diff-line.removed { background-color: var(--diff-del); color: var(--diff-del-text); }
        .diff-line.added { background-color: var(--diff-add); color: var(--diff-add-text); }
        .diff-line.normal { color: var(--text-muted); opacity: 0.7; }
        .diff-mark { width: 24px; font-weight: bold; display: inline-block; flex-shrink: 0; }
    </style>
</head>
<body data-theme="dark">

    <!-- 사이드바 -->
    <aside>
        <div class="sidebar-header">
            <div class="wiki-logo" onclick="goToMain()">
                <span class="material-icons">auto_stories</span>
                <span>MyWiki</span>
            </div>
            <div class="header-actions">
                <button class="lang-toggle" onclick="toggleLang()" id="langBtn">EN</button>
                <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">
                    <span class="material-icons">light_mode</span>
                </button>
            </div>
        </div>
        <div class="search-box">
            <span class="material-icons">search</span>
            <input type="text" id="wikiSearch" placeholder="문서 검색..." onkeyup="searchWiki()">
        </div>
        <button class="btn-add-wiki" onclick="openCreateForm()" id="lblCreateBtn">
            <span class="material-icons">add</span> 새 문서 만들기
        </button>
        <ul class="menu-list" id="menuList"></ul>
    </aside>

    <!-- 메인 영역 -->
    <main>
        <div class="content-container">
            
            <!-- 읽기 모드 판넬 -->
            <div id="paneView" class="wiki-pane active-pane">
                <div class="wiki-actions" id="wikiActionButtons">
                    <button class="btn-icon" onclick="openHistoryPane()" id="lblHistoryIcon" title="역사(수정 기록)"><span class="material-icons">history</span></button>
                    <button class="btn-icon" id="editActionBtn" onclick="openEditForm()" title="편집"><span class="material-icons">edit</span></button>
                    <button class="btn-icon" id="deleteActionBtn" onclick="deleteDocument()" title="삭제" style="color:#ef4444;"><span class="material-icons">delete</span></button>
                </div>
                <div class="wiki-header">
                    <h1 class="wiki-title" id="displayTitle"></h1>
                    <div class="wiki-meta" id="displayMeta"></div>
                </div>
                <div class="wiki-body" id="displayBody"></div>
            </div>

            <!-- 편집/추가 폼 판넬 -->
            <div id="paneForm" class="wiki-pane">
                <h2 id="formModeTitle" style="margin-bottom: 24px;">문서 편집</h2>
                <div class="form-group">
                    <label for="formTitle" id="lblFormTitle">문서 제목</label>
                    <input type="text" id="formTitle" class="form-control">
                </div>
                <div class="form-group">
                    <label for="formTags" id="lblFormTags">태그 (쉼표로 구분)</label>
                    <input type="text" id="formTags" class="form-control">
                </div>
                <div class="form-group">
                    <label id="lblFormImg">이미지 첨부</label>
                    <div class="image-upload-zone" onclick="document.getElementById('imageInput').click()">
                        <span class="material-icons" style="font-size: 2rem; margin-bottom: 4px;">image</span>
                        <p id="lblFormImgZone">클릭하여 이미지 파일 업로드</p>
                        <input type="file" id="imageInput" style="display: none;" accept="image/*" multiple onchange="handleImageUpload(event)">
                    </div>
                    <div class="image-preview-container" id="imagePreviewContainer"></div>
                </div>
                <div class="form-group">
                    <label for="formContent" id="lblFormContent">본문 내용</label>
                    <textarea id="formContent" class="form-control" onkeydown="handleEditorKeyDown(event)" oninput="closeAutoComplete()"></textarea>
                    <ul id="autoCompletePopup" class="autocomplete-popup" onwheel="handlePopupWheel(event)"></ul>
                </div>
                <div class="form-actions">
                    <button class="btn btn-secondary" onclick="switchPane('paneView')" id="lblCancelBtn">취소</button>
                    <button class="btn btn-primary" onclick="saveDocument()" id="lblSaveBtn">저장하기</button>
                </div>
            </div>

            <!-- 역사(수정 기록) 판넬 -->
            <div id="paneHistory" class="wiki-pane">
                <div class="wiki-actions">
                    <button class="btn-icon" onclick="switchPane('paneView')" id="lblBackIcon" title="문서로 돌아가기"><span class="material-icons">arrow_back</span></button>
                </div>
                <div class="wiki-header">
                    <h1 class="wiki-title" id="historyPageTitle">수정 역사</h1>
                    <p style="color: var(--text-muted); font-size: 0.9rem;" id="lblHistoryDesc">해당 문서의 과거 수정 이력을 확인하고 변경 사항을 비교합니다.</p>
                </div>
                
                <ul class="history-list" id="historyListContainer"></ul>
                
                <div id="diffSection" style="display: none; margin-top: 40px;">
                    <h3 style="margin-bottom: 10px; display: flex; align-items: center; gap: 6px;">
                        <span class="material-icons" style="color: var(--accent)">difference</span> <span id="lblDiffTitle">변경 사항 비교</span>
                    </h3>
                    <div class="diff-container" id="diffViewContainer"></div>
                </div>
            </div>

        </div>
    </main>

    <script>
        // 다국어 번역 팩 데이터
        const i18n = {
            ko: {
                mainTitle: "개인 위키",
                mainContent: "<p>나무위키 보고 나도 한 번 만들어보고 싶다는 생각에 만든 공간입니다.</p>",
                searchPlace: "문서 검색...", createBtn: "새 문서 만들기", editBtn: "편집", deleteBtn: "삭제",
                historyBtn: "역사(수정 기록)", backBtn: "문서로 돌아가기", labelTitle: "문서 제목", labelTags: "태그 (쉼표로 구분)",
                labelImg: "이미지 첨부", labelImgZone: "클릭하여 이미지 파일 업로드", labelContent: "본문 내용 (단어를 작성하다가 혹은 빈 줄에서 **Tab**을 눌러보세요!)",
                btnCancel: "취소", btnSave: "저장하기", historyDesc: "해당 문서의 과거 수정 이력을 확인하고 변경 사항을 비교합니다.",
                diffTitle: "변경 사항 비교 (비포 & 애프터)", msgNoHistory: "수정 기록이 없습니다.", btnViewDiff: "변경점 보기",
                msgTitleAlert: "제목을 입력해주세요.", msgDelConfirm: "문서를 삭제하시겠습니까?", modeCreate: "새 문서 작성", modeEdit: "문서 편집",
                metaLastEdit: "최근 수정", historyNoteFirst: "최초 생성", historyNoteEdit: "번째 수정"
            },
            en: {
                mainTitle: "Personal Wiki",
                mainContent: "<p>This is a custom wiki studio space inspired by NamuWiki.</p>",
                searchPlace: "Search wiki...", createBtn: "Create New Document", editBtn: "Edit", deleteBtn: "Delete",
                historyBtn: "History", backBtn: "Back to Document", labelTitle: "Document Title", labelTags: "Tags (separated by commas)",
                labelImg: "Attach Images", labelImgZone: "Click to upload image files", labelContent: "Content (Press **Tab** at an empty line or mid-word for tags!)",
                btnCancel: "Cancel", btnSave: "Save", historyDesc: "Check the revision history of this document and compare changes.",
                diffTitle: "Compare Changes (Before & After)", msgNoHistory: "No history found.", btnViewDiff: "View Changes",
                msgTitleAlert: "Please enter a title.", msgDelConfirm: "Are you sure you want to delete this document?", modeCreate: "New Document", modeEdit: "Edit Document",
                metaLastEdit: "Last Edit", historyNoteFirst: "First Created", historyNoteEdit: "th Revision"
            }
        };

        let currentLang = "ko"; // 기본 언어 세팅

        const htmlTagsDb = [
            { tag: "a", desc: "Hyperlink / 링크" }, { tag: "b", desc: "Bold / 굵은 글씨" },
            { tag: "blockquote", desc: "Blockquote / 인용구" }, { tag: "br", desc: "Line Break / 줄바꿈" },
            { tag: "code", desc: "Code Inline / 코드 강조" }, { tag: "div", desc: "Division / 구역" },
            { tag: "em", desc: "Emphasis / 이탤릭 강조" }, { tag: "h2", desc: "Heading 2 / 대제목" },
            { tag: "h3", desc: "Heading 3 / 소제목" }, { tag: "i", desc: "Italic / 아이콘·기울임" },
            { tag: "img", desc: "Image / 이미지 삽입" }, { tag: "li", desc: "List Item / 리스트 항목" },
            { tag: "ol", desc: "Ordered List / 숫자 리스트" }, { tag: "p", desc: "Paragraph / 본문 문단" },
            { tag: "pre", desc: "Preformatted / 코드 블록" }, { tag: "span", desc: "Span / 인라인 그룹" },
            { tag: "strong", desc: "Strong / 굵은 강조" }, { tag: "table", desc: "Table / 표" },
            { tag: "ul", desc: "Unordered List / 기호 리스트" }
        ];

        let wikiData = {};
        let currentKey = "메인페이지";
        let uploadedImages = [];
        let activeSelectedIndex = 0; 
        let currentMatchTags = [];

        // 타임스탬프를 유저 로컬 시간대에 맞는 문자열로 포맷팅해 주는 함수
        function formatLocalTime(timestamp) {
            if (!timestamp) return "";
            const date = new Date(timestamp);
            return date.toLocaleString(currentLang === 'ko' ? 'ko-KR' : 'en-US', {
                year: 'numeric', month: '2-digit', day: '2-digit',
                hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false
            });
        }

        function init() {
            // 테마 로드
            const savedTheme = localStorage.getItem('wiki-theme') || 'dark';
            document.body.setAttribute('data-theme', savedTheme);
            document.getElementById('themeBtn').innerHTML = `<span class="material-icons">${savedTheme === 'dark' ? 'light_mode' : 'dark_mode'}</span>`;

            // 언어 로드
            currentLang = localStorage.getItem('wiki-lang') || 'ko';
            updateUIStrings();

            // 데이터 로드
            const savedData = localStorage.getItem('MASTER_WIKI_STORAGE_KEY');
            if (savedData && savedData !== "{}" && Object.keys(JSON.parse(savedData)).length > 0) {
                wikiData = JSON.parse(savedData);
            } else {
                // 초기화 데이터 설정 (대문 데이터 고정 필드 구축)
                wikiData = {
                    "메인페이지": {
                        title: "메인페이지", // 키값과 동치
                        isMain: true,
                        timestamp: 1779458400000, 
                        tags: ["Welcome"],
                        images: [],
                        content: "", 
                        history: []
                    }
                };
                localStorage.setItem('MASTER_WIKI_STORAGE_KEY', JSON.stringify(wikiData));
            }

            const savedKey = localStorage.getItem('wiki-current-key');
            currentKey = (savedKey && wikiData[savedKey]) ? savedKey : Object.keys(wikiData)[0];

            renderSidebar();
            if(currentKey) {
                loadDocument(currentKey);
            }
        }

        // 언어 변경 시 UI에 텍스트를 뿌려주는 매핑 함수
        function updateUIStrings() {
            const lang = currentLang;
            document.getElementById('langBtn').innerText = lang === 'ko' ? 'EN' : 'KO';
            document.getElementById('wikiSearch').placeholder = i18n[lang].searchPlace;
            document.getElementById('lblCreateBtn').innerHTML = `<span class="material-icons">add</span> ${i18n[lang].createBtn}`;
            document.getElementById('editActionBtn').title = i18n[lang].editBtn;
            document.getElementById('deleteActionBtn').title = i18n[lang].deleteBtn;
            document.getElementById('lblHistoryIcon').title = i18n[lang].historyBtn;
            document.getElementById('lblBackIcon').title = i18n[lang].backBtn;
            document.getElementById('lblFormTitle').innerText = i18n[lang].labelTitle;
            document.getElementById('lblFormTags').innerText = i18n[lang].labelTags;
            document.getElementById('lblFormImg').innerText = i18n[lang].labelImg;
            document.getElementById('lblFormImgZone').innerText = i18n[lang].labelImgZone;
            document.getElementById('lblFormContent').innerText = i18n[lang].labelContent;
            document.getElementById('lblCancelBtn').innerText = i18n[lang].btnCancel;
            document.getElementById('lblSaveBtn').innerText = i18n[lang].btnSave;
            document.getElementById('lblHistoryDesc').innerText = i18n[lang].historyDesc;
            document.getElementById('lblDiffTitle').innerText = i18n[lang].diffTitle;
        }

        function toggleLang() {
            currentLang = currentLang === 'ko' ? 'en' : 'ko';
            localStorage.setItem('wiki-lang', currentLang);
            updateUIStrings();
            renderSidebar();
            if(currentKey) loadDocument(currentKey);
        }

        function commitStorage() {
            localStorage.setItem('MASTER_WIKI_STORAGE_KEY', JSON.stringify(wikiData));
        }

        function getCaretCoordinates(textarea, position) {
            const text = textarea.value.substring(0, position);
            const div = document.createElement('div');
            const copyStyle = window.getComputedStyle(textarea);
            for (const prop of copyStyle) { div.style[prop] = copyStyle[prop]; }
            div.style.position = 'absolute'; div.style.visibility = 'hidden';
            div.style.whiteSpace = 'pre-wrap'; div.style.wordBreak = 'break-all';
            div.textContent = text;
            const span = document.createElement('span');
            span.textContent = textarea.value.substring(position) || '.';
            div.appendChild(span); document.body.appendChild(div);
            const { offsetLeft: spanLeft, offsetTop: spanTop } = span;
            const lineHeight = parseInt(copyStyle.lineHeight);
            document.body.removeChild(div);
            const rect = textarea.getBoundingClientRect();
            return { left: rect.left + spanLeft - textarea.scrollLeft, top: rect.top + spanTop - textarea.scrollTop + lineHeight };
        }

        function handleEditorKeyDown(event) {
            const textarea = event.target; const popup = document.getElementById('autoCompletePopup');
            if (popup.style.display === 'block') {
                if (event.key === 'ArrowDown') { event.preventDefault(); activeSelectedIndex = (activeSelectedIndex + 1) % currentMatchTags.length; renderPopupItems(); scrollSelectedIntoView(); return; }
                if (event.key === 'ArrowUp') { event.preventDefault(); activeSelectedIndex = (activeSelectedIndex - 1 + currentMatchTags.length) % currentMatchTags.length; renderPopupItems(); scrollSelectedIntoView(); return; }
                if (event.key === 'Enter') { event.preventDefault(); injectSelectedTag(textarea); return; }
                if (event.key === 'Escape') { event.preventDefault(); closeAutoComplete(); return; }
            }
            if (event.key === 'Tab') {
                event.preventDefault(); const text = textarea.value; const cursorPos = textarea.selectionStart;
                const textBeforeCursor = text.substring(0, cursorPos); const words = textBeforeCursor.split(/[\s\n<>]+/);
                const lastWord = words[words.length - 1].toLowerCase(); const matches = htmlTagsDb.filter(item => item.tag.startsWith(lastWord));
                if (lastWord && matches.length > 0) { currentMatchTags = matches; popup.setAttribute('data-search', lastWord); }
                else { currentMatchTags = [...htmlTagsDb]; popup.setAttribute('data-search', ''); }
                activeSelectedIndex = 0; openAutoCompletePopup(textarea);
            }
        }

        function openAutoCompletePopup(textarea) {
            const popup = document.getElementById('autoCompletePopup'); const cursorPos = textarea.selectionStart;
            const coords = getCaretCoordinates(textarea, cursorPos);
            popup.style.position = 'fixed'; popup.style.left = `${coords.left}px`; popup.style.top = `${coords.top + 4}px`; popup.style.display = 'block';
            renderPopupItems(); popup.scrollTop = 0;
        }

        function renderPopupItems() {
            const popup = document.getElementById('autoCompletePopup'); popup.innerHTML = '';
            currentMatchTags.forEach((item, idx) => {
                const li = document.createElement('li'); li.className = `ac-item ${idx === activeSelectedIndex ? 'selected' : ''}`;
                li.onclick = () => { activeSelectedIndex = idx; injectSelectedTag(document.getElementById('formContent')); };
                li.innerHTML = `<span class="ac-tag">&lt;${item.tag}&gt;</span><span class="ac-desc">${item.desc}</span>`;
                popup.appendChild(li);
            });
        }

        function handlePopupWheel(event) {
            const popup = document.getElementById('autoCompletePopup'); if (popup.style.display === 'block') { event.preventDefault(); popup.scrollTop += event.deltaY * 0.5; }
        }

        function scrollSelectedIntoView() {
            const popup = document.getElementById('autoCompletePopup'); const items = popup.getElementsByClassName('ac-item');
            if (items.length === 0 || !items[activeSelectedIndex]) return;
            const selectedItem = items[activeSelectedIndex]; const itemTop = selectedItem.offsetTop; const itemBottom = itemTop + selectedItem.offsetHeight;
            if (itemTop < popup.scrollTop) { popup.scrollTop = itemTop; } else if (itemBottom > popup.scrollTop + popup.clientHeight) { popup.scrollTop = itemBottom - popup.clientHeight; }
        }

        function injectSelectedTag(textarea) {
            const popup = document.getElementById('autoCompletePopup'); if (currentMatchTags.length === 0) return;
            const selected = currentMatchTags[activeSelectedIndex].tag; const text = textarea.value; const cursorPos = textarea.selectionStart;
            const searchWord = popup.getAttribute('data-search') || ''; const startPos = cursorPos - searchWord.length;
            const before = text.substring(0, startPos); const after = text.substring(cursorPos);
            textarea.value = before + `<${selected}></${selected}>` + after;
            const newCursorPos = startPos + selected.length + 2; textarea.setSelectionRange(newCursorPos, newCursorPos); textarea.focus(); closeAutoComplete();
        }

        function closeAutoComplete() { document.getElementById('autoCompletePopup').style.display = 'none'; }

        function toggleTheme() {
            const currentTheme = document.body.getAttribute('data-theme'); const targetTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.body.setAttribute('data-theme', targetTheme); localStorage.setItem('wiki-theme', targetTheme);
            document.getElementById('themeBtn').innerHTML = `<span class="material-icons">${targetTheme === 'dark' ? 'light_mode' : 'dark_mode'}</span>`;
        }

        function switchPane(paneId) {
            document.querySelectorAll('.wiki-pane').forEach(pane => pane.classList.remove('active-pane'));
            document.getElementById(paneId).classList.add('active-pane'); closeAutoComplete();
        }

        function renderSidebar() {
            const menuList = document.getElementById('menuList'); menuList.innerHTML = '';
            Object.keys(wikiData).forEach(key => {
                const li = document.createElement('li'); li.className = `menu-item ${key === currentKey ? 'active' : ''}`; li.id = `menu-${key}`;
                
                // 대문이면 다국어 번역 제목 적용, 일반 문서면 커스텀 타이틀 사용
                const sidebarTitle = wikiData[key].isMain ? i18n[currentLang].mainTitle : wikiData[key].title;
                
                li.innerHTML = `<span class="material-icons" style="font-size:1.1rem;">${wikiData[key].isMain ? 'home' : 'description'}</span> ${sidebarTitle}`;
                li.onclick = () => { loadDocument(key); switchPane('paneView'); }; menuList.appendChild(li);
            });
        }

        function loadDocument(key) {
            currentKey = key; localStorage.setItem('wiki-current-key', key);
            const doc = wikiData[key]; if (!doc) return;

            document.querySelectorAll('.menu-item').forEach(item => item.classList.remove('active'));
            if(document.getElementById(`menu-${key}`)) document.getElementById(`menu-${key}`).classList.add('active');
            
            let displayTitle = doc.title;
            let displayBodyContent = doc.content;

            // 대문 전용 차단 및 다국어 스위칭 로직
            if (doc.isMain) {
                displayTitle = i18n[currentLang].mainTitle;
                displayBodyContent = i18n[currentLang].mainContent;
                
                // 대문일 때는 편집, 삭제 버튼 숨기기
                document.getElementById('editActionBtn').style.display = 'none';
                document.getElementById('deleteActionBtn').style.display = 'none';
                document.getElementById('lblHistoryIcon').style.display = 'none'; // 역사 확인도 불필요하므로 차단
            } else {
                // 일반 문서는 상단 툴바 활성화
                document.getElementById('editActionBtn').style.display = 'flex';
                document.getElementById('deleteActionBtn').style.display = 'flex';
                document.getElementById('lblHistoryIcon').style.display = 'flex';
            }

            document.getElementById('displayTitle').innerText = displayTitle;
            
            let imgHtml = '';
            if (doc.images && doc.images.length > 0) { doc.images.forEach(img => { imgHtml += `<img src="${img}">`; }); }
            document.getElementById('displayBody').innerHTML = displayBodyContent + imgHtml;
            let tagsHtml = doc.tags.map(tag => `<span class="tag">#${tag.trim()}</span>`).join('');
            
            const localFormattedTime = formatLocalTime(doc.timestamp);
            document.getElementById('displayMeta').innerHTML = `${tagsHtml} <span style="margin-left:auto; font-size:0.8rem;">${i18n[currentLang].metaLastEdit}: ${localFormattedTime}</span>`;
        }

        function openCreateForm() {
            uploadedImages = [];
            document.getElementById('formModeTitle').innerText = i18n[currentLang].modeCreate;
            document.getElementById('formTitle').value = ""; document.getElementById('formTitle').disabled = false;
            document.getElementById('formTags').value = ""; document.getElementById('formContent').value = "";
            document.getElementById('imagePreviewContainer').innerHTML = ""; switchPane('paneForm');
        }

        function openEditForm() {
            const doc = wikiData[currentKey];
            if(doc.isMain) return; // 대문 수정 시도 원천 차단

            document.getElementById('formModeTitle').innerText = `${i18n[currentLang].modeEdit} - ${doc.title}`;
            document.getElementById('formTitle').value = doc.title; document.getElementById('formTitle').disabled = true;
            document.getElementById('formTags').value = doc.tags.join(', '); document.getElementById('formContent').value = doc.content;
            uploadedImages = doc.images ? [...doc.images] : []; renderImagePreviews(); switchPane('paneForm');
        }

        function saveDocument() {
            const title = document.getElementById('formTitle').value.trim();
            const tagsInput = document.getElementById('formTags').value;
            const content = document.getElementById('formContent').value;
            if (!title) return alert(i18n[currentLang].msgTitleAlert);

            const key = title.replace(/\s+/g, '_');
            
            // 시스템 변수 보호 장치 (우회 수정 시도 차단)
            if(wikiData[key] && wikiData[key].isMain) return; 

            const tags = tagsInput ? tagsInput.split(',').map(t => t.trim()).filter(t => t) : [];
            const currentTimestamp = Date.now();

            let historyArray = (wikiData[key] && wikiData[key].history) ? [...wikiData[key].history] : [];
            historyArray.push({
                timestamp: currentTimestamp,
                content: content,
                isFirst: historyArray.length === 0
            });

            wikiData[key] = { title: title, timestamp: currentTimestamp, tags: tags, content: content, images: uploadedImages, history: historyArray };
            commitStorage(); renderSidebar(); loadDocument(key); switchPane('paneView');
        }

        function openHistoryPane() {
            const doc = wikiData[currentKey];
            if(doc.isMain) return; // 대문 역사 차단

            document.getElementById('historyPageTitle').innerText = `"${doc.title}"`;
            const container = document.getElementById('historyListContainer');
            container.innerHTML = ''; document.getElementById('diffSection').style.display = 'none';

            if (!doc.history || doc.history.length === 0) {
                container.innerHTML = `<li class="history-item">${i18n[currentLang].msgNoHistory}</li>`;
                switchPane('paneHistory'); return;
            }

            for (let i = doc.history.length - 1; i >= 0; i--) {
                const item = doc.history[i]; const li = document.createElement('li'); li.className = 'history-item';
                const prevContent = i > 0 ? doc.history[i - 1].content : "";
                
                const noteText = item.isFirst ? i18n[currentLang].historyNoteFirst : `${i + 1}${i18n[currentLang].historyNoteEdit}`;
                const localHistoryTime = formatLocalTime(item.timestamp);

                li.innerHTML = `
                    <div class="history-info">
                        <h4>${noteText}</h4>
                        <p><span class="material-icons" style="font-size:0.8rem; vertical-align:middle;">schedule</span> ${localHistoryTime}</p>
                    </div>
                    <button class="btn btn-secondary" style="padding: 6px 12px; font-size:0.85rem;" onclick="compareVersions(\`${escapeHtml(prevContent)}\`, \`${escapeHtml(item.content)}\`)" > ${i18n[currentLang].btnViewDiff} </button>
                `;
                container.appendChild(li);
            }
            switchPane('paneHistory');
        }

        function compareVersions(oldText, newText) {
            const oldLines = oldText.split('\n'); const newLines = newText.split('\n');
            const diffView = document.getElementById('diffViewContainer'); diffView.innerHTML = '';
            let i = 0, j = 0;
            while (i < oldLines.length || j < newLines.length) {
                if (i < oldLines.length && j < newLines.length && oldLines[i] === newLines[j]) {
                    if (oldLines[i].trim() !== "") createDiffLine('normal', ' ', oldLines[i]); i++; j++;
                } else {
                    if (i < oldLines.length && (j >= newLines.length || !newLines.includes(oldLines[i]))) { createDiffLine('removed', '-', oldLines[i]); i++; }
                    else if (j < newLines.length) { createDiffLine('added', '+', newLines[j]); j++; }
                }
            }
            document.getElementById('diffSection').style.display = 'block';
            document.getElementById('diffSection').scrollIntoView({ behavior: 'smooth' });
        }

        function createDiffLine(className, mark, text) {
            const container = document.getElementById('diffViewContainer');
            const div = document.createElement('div'); div.className = `diff-line ${className}`;
            div.innerHTML = `<span class="diff-mark">${mark}</span><span>${escapeHtml(text)}</span>`;
            container.appendChild(div);
        }

        function escapeHtml(text) { return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;"); }
        function handleImageUpload(event) {
            const files = event.target.files; if(!files) return;
            Array.from(files).forEach(file => {
                const reader = new FileReader();
                reader.onload = function(e) { uploadedImages.push(e.target.result); renderImagePreviews(); };
                reader.readAsDataURL(file);
            });
        }
        function renderImagePreviews() {
            const container = document.getElementById('imagePreviewContainer'); container.innerHTML = '';
            uploadedImages.forEach((img, idx) => {
                const wrap = document.createElement('div'); wrap.className = 'preview-img-wrap';
                wrap.innerHTML = `<img src="${img}"><button class="del-btn" onclick="uploadedImages.splice(${idx},1);renderImagePreviews();">✕</button>`;
                container.appendChild(wrap);
            });
        }
        function deleteDocument() {
            if(wikiData[currentKey] && wikiData[currentKey].isMain) return; // 대문 삭제 원천 보호
            if(!confirm(i18n[currentLang].msgDelConfirm)) return;
            delete wikiData[currentKey]; commitStorage(); init();
        }
        function searchWiki() {
            const q = document.getElementById('wikiSearch').value.toLowerCase();
            Object.keys(wikiData).forEach(k => {
                const li = document.getElementById(`menu-${k}`); if(!li) return;
                const matchTitle = wikiData[k].isMain ? i18n[currentLang].mainTitle : wikiData[k].title;
                const matchContent = wikiData[k].isMain ? i18n[currentLang].mainContent : wikiData[k].content;
                li.style.display = (matchTitle.toLowerCase().includes(q) || matchContent.toLowerCase().includes(q)) ? 'flex' : 'none';
            });
        }
        function goToMain() { const keys = Object.keys(wikiData); if(keys.length>0) { loadDocument(keys[0]); switchPane('paneView'); } }

        window.onload = init;
    </script>
</body>
